<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joke of the Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F4EF;
      --card: #FFFFFF;
      --ink: #1A1814;
      --muted: #8A8680;
      --accent: #D4541A;
      --accent-light: #FAE9DF;
      --border: rgba(26,24,20,0.12);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    .header {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.6rem;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 42px;
      font-weight: 400;
      line-height: 1.1;
      color: var(--ink);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      margin-top: 0.75rem;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 0 1rem;
      height: 46px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder {
      color: var(--muted);
    }

    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      height: 46px;
      padding: 0 1.25rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .joke-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: border-color 0.3s;
    }

    .joke-card.has-joke {
      border-color: var(--accent);
    }

    .joke-word-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-light);
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 1rem;
    }

    .joke-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .joke-text {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      line-height: 1.55;
      color: var(--ink);
    }

    .placeholder-text {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      font-style: italic;
      line-height: 1.6;
    }

    .loading-text {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .error-msg {
      font-size: 13px;
      color: #C0392B;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .api-key-section {
      margin-bottom: 1.25rem;
    }

    .api-key-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    .api-key-row {
      display: flex;
      gap: 8px;
    }

    .api-key-row input {
      font-family: 'DM Sans', monospace;
      font-size: 13px;
    }

    .save-btn {
      background: var(--ink);
      font-size: 13px;
      padding: 0 1rem;
    }

    .key-saved {
      font-size: 12px;
      color: #2E7D32;
      margin-top: 5px;
      display: none;
    }

    footer {
      margin-top: 2rem;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <p class="eyebrow">Daily laughs</p>
      <h1>Joke of<br>the <em>Day</em></h1>
      <p class="tagline">Type any word. Get a joke built around it.</p>
    </div>

    <div class="api-key-section">
      <label class="api-key-label">Your Anthropic API key (saved in browser only)</label>
      <div class="api-key-row">
        <input type="password" id="api-key-input" placeholder="sk-ant-..." />
        <button class="save-btn" onclick="saveKey()">Save</button>
      </div>
      <p class="key-saved" id="key-saved">Key saved!</p>
    </div>

    <div class="input-group">
      <input type="text" id="word-input" placeholder="e.g. pizza, robot, Monday…" maxlength="40" />
      <button id="gen-btn" onclick="generateJoke()">Tell me a joke</button>
    </div>

    <div class="joke-card" id="joke-card">
      <p class="placeholder-text">Your joke will appear here…</p>
    </div>
    <p class="error-msg" id="err-msg"></p>

    <footer>Powered by Claude &nbsp;·&nbsp; jokes are generated fresh each time</footer>
  </div>

  <script>
    const wordInput = document.getElementById('word-input');
    const card = document.getElementById('joke-card');
    const btn = document.getElementById('gen-btn');
    const errMsg = document.getElementById('err-msg');
    const apiKeyInput = document.getElementById('api-key-input');
    const keySaved = document.getElementById('key-saved');

    const saved = localStorage.getItem('anthropic_key');
    if (saved) apiKeyInput.value = saved;

    wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') generateJoke(); });

    function saveKey() {
      const key = apiKeyInput.value.trim();
      if (!key) return;
      localStorage.setItem('anthropic_key', key);
      keySaved.style.display = 'block';
      setTimeout(() => keySaved.style.display = 'none', 2000);
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showError(msg) {
      errMsg.textContent = msg;
      errMsg.style.display = 'block';
    }

    async function generateJoke() {
      const word = wordInput.value.trim();
      const apiKey = localStorage.getItem('anthropic_key') || apiKeyInput.value.trim();

      if (!apiKey) { showError('Please enter and save your Anthropic API key first.'); return; }
      if (!word) { showError('Please enter a word.'); return; }

      errMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Thinking…';
      card.className = 'joke-card';
      card.innerHTML = '<p class="loading-text">Crafting your joke…</p>';

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 300,
            system: 'You are a witty comedian. When given a word, write a single short joke (setup + punchline) that cleverly incorporates that word. Keep it clean, clever, and under 3 sentences. Return ONLY the joke text, nothing else.',
            messages: [{ role: 'user', content: `Word: "${word}"` }]
          })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'API error');

        const joke = data.content?.[0]?.text?.trim();
        if (!joke) throw new Error('No joke returned');

        card.className = 'joke-card has-joke';
        card.innerHTML = `
          <div class="joke-word-tag">${esc(word)}</div>
          <p class="joke-text">${esc(joke)}</p>
        `;
      } catch (e) {
        card.innerHTML = '<p class="placeholder-text">Your joke will appear here…</p>';
        showError(e.message || 'Something went wrong. Try again!');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Tell me a joke';
      }
    }
  </script>
</body>
</html>
